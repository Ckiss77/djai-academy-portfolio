<!doctype html>
<html lang="th">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>DJAI Academy | Learning Portal</title>
    <meta name="robots" content="noindex" />
    <meta name="theme-color" content="#050817" />
    <link rel="icon" type="image/png" href="assets/djai-logo.png" />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Noto+Sans+Thai:wght@300;400;500;600;700;800&family=Sora:wght@400;500;600;700;800&display=swap"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="styles.css" />
    <link rel="stylesheet" href="elearning.css" />
  </head>
  <body class="portal-body">
    <canvas class="signal-canvas" id="signalCanvas" aria-hidden="true"></canvas>
    <div class="ambient ambient-a" aria-hidden="true"></div>
    <div class="ambient ambient-b" aria-hidden="true"></div>
    <div class="scanline" aria-hidden="true"></div>

    <header class="site-header">
      <a class="brand" href="index.html" aria-label="DJAI Academy home">
        <span class="brand-mark"><img src="assets/djai-mark.jpg" alt="" /></span>
        <span class="brand-copy">
          <strong>DJAI Academy</strong>
          <span>Learning Portal</span>
        </span>
      </a>
      <nav class="nav" aria-label="Portal navigation">
        <a href="index.html">Portfolio</a>
        <a href="admin.html">Admin</a>
      </nav>
    </header>

    <main class="portal-main">
      <section class="portal-hero" id="loginView">
        <div class="portal-panel">
          <p class="eyebrow">DJAI E-Learning</p>
          <h1>Secure learning for AI transformation.</h1>
          <p>
            เข้าสู่ระบบเพื่อดูคอร์สออนไลน์ วิดีโอ YouTube แบบ unlisted และเอกสารประกอบการเรียน
            ตามสิทธิ์ที่ได้รับจาก DJAI Academy
          </p>
        </div>
        <form class="portal-form" id="loginForm">
          <h2>Student Login</h2>
          <p class="portal-status" id="loginStatus"></p>
          <div class="form-grid">
            <label class="field">
              <span>Email</span>
              <input name="email" type="email" autocomplete="email" required />
            </label>
            <label class="field">
              <span>Password</span>
              <input name="password" type="password" autocomplete="current-password" required />
            </label>
            <button class="btn btn-primary" type="submit">Login</button>
          </div>
        </form>
      </section>

      <section class="is-hidden" id="appView">
        <div class="portal-toolbar">
          <div>
            <p class="eyebrow">My Courses</p>
            <h1 class="sr-only">DJAI Learning Portal</h1>
            <p class="portal-user" id="studentSummary"></p>
          </div>
          <button class="btn btn-secondary" id="logoutButton" type="button">Logout</button>
        </div>

        <div class="course-grid" id="courseGrid"></div>
        <div class="lesson-layout is-hidden" id="lessonLayout">
          <article class="lesson-player">
            <div class="video-frame" id="videoFrame"></div>
            <div class="lesson-meta">
              <p class="eyebrow" id="activeCourseCategory"></p>
              <h2 id="activeCourseTitle"></h2>
              <p id="activeCourseDescription"></p>
            </div>
          </article>
          <aside class="portal-panel">
            <h2>Lessons</h2>
            <div class="lesson-list" id="lessonList"></div>
            <h2>Documents</h2>
            <div class="document-list" id="documentList"></div>
          </aside>
        </div>
      </section>
    </main>

    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="elearning-config.js"></script>
    <script src="learn.js"></script>
    <script src="script.js"></script>
  </body>
</html>
